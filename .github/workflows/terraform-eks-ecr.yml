name: Terraform EKS & ECR

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
  push:
    branches: [main]
    paths:
      - 'terraform-eks-ecr/**'

env:
  TF_WORKING_DIR: terraform-eks-ecr

jobs:
  # Stage 1 - Runs automatically on push, or for plan/apply/destroy on manual trigger
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend-config=dev.backend.tfvars

      - name: Terraform Plan
        run: terraform plan -var-file=dev.tfvars

      - name: Terraform Plan Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform plan -destroy -var-file=dev.tfvars

  # Stage 2 - Requires manual approval, runs only for apply or destroy
  apply:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest
    needs: plan
    if: github.event.inputs.action == 'apply' || github.event.inputs.action == 'destroy'
    environment: dev
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend-config=dev.backend.tfvars

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -var-file=dev.tfvars -auto-approve

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -var-file=dev.tfvars -auto-approve
