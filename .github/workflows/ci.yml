name: CI - Build, Scan, Dockerize & Push

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Cache SonarQube packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build and SonarCloud Scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=smruti1992_myproject

    - name: Upload JAR as GitHub Artifact
      uses: actions/upload-artifact@v4
      with:
        name: java-app-jar
        path: target/java-app-1.0.0.jar
        retention-days: 30

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: java-app-jar
        path: ./artifact

    - name: Generate image tag
      id: tag
      run: |
        SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        TAG="${{ github.run_number }}-${SHORT_SHA}"
        echo "IMAGE_TAG=${TAG}" >> $GITHUB_OUTPUT

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image
      run: |
        docker build -f Docker/dockerfile \
          --build-arg JAR_FILE=artifact/java-app-1.0.0.jar \
          -t smruti1992/smt-java-website:${{ steps.tag.outputs.IMAGE_TAG }} \
          -t smruti1992/smt-java-website:latest \
          .

    - name: Push Docker Image
      run: |
        docker push smruti1992/smt-java-website:${{ steps.tag.outputs.IMAGE_TAG }}
        docker push smruti1992/smt-java-website:latest
